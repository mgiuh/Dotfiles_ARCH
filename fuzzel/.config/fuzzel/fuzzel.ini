# Configuración estética para Fuzzel (Match con Niri)

[main]
# Fuente limpia y moderna (puedes cambiarla por tu tipografía favorita)
font=JetBrainsMono Nerd Font:size=14
fields=name,generic,comment,exec
terminal=alacritty

# Ajustes de la ventana del lanzador
prompt="❯ "
icon-theme=Papirus-Dark
width=40
tabs=4
horizontal-pad=20
vertical-pad=16
inner-pad=10

# ¡AQUÍ ESTÁ LA MAGIA DEL MATCH CON NIRI!
# Radio de las esquinas (Hicimos match con las 12px de tus ventanas)
border-radius=12
# Ancho del borde (Mismo grosor que el focus-ring de Niri)
border-width=4

[colors]
# Formato: RRGGBBAA (Los últimos dos números son la opacidad/transparencia)
# Fondo oscuro elegante (Catppuccin Mocha con un toque de transparencia)
background=1e1e2edd
# Color del texto normal
text=cdd6f4ff
# Color del prompt (el símbolo ❯)
prompt=f5c2e7ff
# Color del texto que vas escribiendo
input=cdd6f4ff
# Color de las letras que coinciden con la búsqueda
match=f5e0dcff

# La barra de selección activa (Fondo azul Catppuccin)
selection=89b4faff
# Texto de la opción seleccionada (Contraste oscuro)
selection-text=11111bff
# Letras coincidentes dentro de la opción seleccionada
selection-match=f5e0dcff

# El color del borde exterior (Usamos el azul claro para conectar con Niri)
border=89b4faff

[border]
# Un extra de aire alrededor del contenido interno
radius=12
width=4
