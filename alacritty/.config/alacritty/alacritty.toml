# -----------------------------------------------------------------------------
# CONFIGURACIÓN DE ALACRITTY - MATCH PREMIUM CON NIRI
# -----------------------------------------------------------------------------

[window]
# Transparencia del fondo (0.0 totalmente transparente, 1.0 opaco)
# Un 0.85 o 0.90 te da el look cyberpunk perfecto sin perder legibilidad
opacity = 0.88

# Margen interno para que el texto respire y no choque con las esquinas curvas
padding = { x = 12, y = 12 }

# Decoraciones manejadas por Niri
decorations = "None"

[font]
# Tu fuente favorita. Si usas otra, puedes cambiar el nombre aquí
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 13.0

# -----------------------------------------------------------------------------
# PALETA DE COLORES: CATPPUCCIN MOCHA
# -----------------------------------------------------------------------------
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5bde6" # Rosa pastel para hacer juego con tu prompt

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"
