<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Para ventanas, barras y menús -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Hack Nerd Font</family>
    </prefer>
  </alias>
  
  <!-- Para tu terminal y Neovim -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hack Nerd Font</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hack Nerd Font Mono</family>
    </prefer>
   </alias>

</fontconfig>
