# ===================================================================
# 1. INTERFAZ DE USUARIO (UI) y VISTA
# ===================================================================

# El esquema de colores (opciones: default, jungle, snow, ranger)
set colorscheme default

# Confirmacion antes de borrar o eliminar de verdad
set confirm_on_delete always

# Dibujar bordes decorativos entre las columnas para separar directorios
set draw_borders separators

# Mostrar el número de línea relativo (estilo Neovim) en la lista de archivos
set line_numbers relative

# Guardar el historial de directorios al salir
set save_dir_history true

# Mostrar el tamaño de los archivos en la barra de estado
set display_size_in_status_bar true

# Mostrar títulos de pestañas en la parte superior si abres varias
set show_tab_title_bar true

# Encolar el estado de Git en los directorios (indica si hay cambios, etc.)
set vcs_enabled true

# Prevenir que Ranger intente previsualizar archivos gigantescos (en bytes, ej: 10MB)
set preview_max_size 10485760

# ===================================================================
# 2. PREVISUALIZACIONES (PREVIEWS)
# ===================================================================

# Habilitar la previsualización de archivos en la tercera columna
set preview_files true
set preview_directories true
set collapse_preview true

# Habilitar la previsualización de imágenes
set preview_images true

# Método de renderizado de imágenes. 
# Como usas Niri/Wayland, el método 'ueberzug' (vía ueberzugpp) es excelente,
# o si usas Kitty/Alacritty con soporte gráfico, podemos ajustarlo luego.
set preview_images_method ueberzug


# ===================================================================
# 3. ATAJOS DE TECLADO (MAPPINGS) PERSONALIZADOS
# ===================================================================

# Cambiar la orden para eliminar archivos (usar 'DD' en vez del engorroso por defecto)
map DD shell trash-put %s

# Alternar la visibilidad de archivos ocultos (Default de Ranger)
map zh toggle_option show_hidden

# Un atajo rápido para recargar la configuración si haces cambios sin salir de Ranger
map R reload_cwd

# Crear un atajo para abrir una terminal en el directorio actual (ajusta según tu terminal)
map tt shell alacritty &

# Mapeos rápidos para saltar a directorios (g + tecla)
map gd cd ~/Dotfiles_ARCH
map gp cd ~/Proyectos
map gD cd ~/Descargas
map gm cd /run/media

# Mapeos para mover archivos seleccionados directamente a carpetas comunes (m + tecla)
map md shell mv %s ~/Dotfiles_ARCH
map mp shell mv %s ~/Proyectos
